<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tap 2 start</title>
    <style>
        @font-face {
            font-family: 'Google Sans';
            src: url('https://fonts.gstatic.com/s/googlesans/v29/4UaGrENHsxJlGDuGo1OIlL3Owp4.woff2') format('woff2');
            font-weight: bold;
        }
        body { margin: 0; padding: 0; background-color: #f5f5f5; overflow: hidden; touch-action: none; font-family: 'Google Sans', sans-serif; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
<script>
let state = 'TITLE'; 
let score = 0;
let bestScore = 0;

let W, H;
let boxX, boxY, boxAngle = 0;
let baseSpeedX;
let currentSpeed = 0;
let amplitude;
let baseline;
let waveDirection = -1;
let yOffset = 0;

let boxSize;
let currentBoxSize; 
let boxHollowLerp = 0; 

let bar1, bar2;
let barWidth, barHeight;
let effectiveBarWidth; // [신규] 난이도에 따라 점점 좁아지는 "실제 탭 판정" 폭

let gameOverExpandProgress = 0;
let returnProgress = 0;
let returnStartX, returnStartY, returnStartAngle, returnStartSize;

let isDarkMode = false;

// [신규] 배경 깜빡임(Flash) 방지를 위한 다중 파동(Ripple) 배열 시스템
let ripples = [];
let baseBgColor;
let baseGridAlpha = 255;
let currentTextColor;

// [신규] 게임오버 카메라(따라가기 + 확대 + 기울임) 상태값
let camX, camY, camZoom, camTilt;
let camReturnStartX, camReturnStartY, camReturnStartZoom, camReturnStartTilt;
const CAM_ZOOM_MAX = 1.4;   // 게임오버 시 최대 줌
const CAM_TILT_MAX = -0.12; // 게임오버 시 최대 기울기(라디안)
const BAR_POP_SCALE = 1.35;   // 막대 모양이 바뀔 때 팝 이펙트 최대 크기
const TIER_SCORE_STEP = 15;   // [신규] 난이도 단계가 한 단계 오르는 점수 간격

let colBgLight, colBgDark, colBarLight, colBarDark, colBox;
let isSupported = true;
let gradientAlpha = 255;
let titleSlideProgress = 0;
let titleAlpha = 255;
let bestScoreSlideProgress = 0; // [신규] BEST SCORE가 타이틀보다 살짝 늦게 따라오도록
let bestScoreAlpha = 0;
let spinSpeed = 0;
let scorePopScale = 1;

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    colBgLight = color('#f5f5f5');
    colBgDark = color('#1d1d1d'); 
    colBarLight = color('#1d1d1d'); 
    colBarDark = color('#f5f5f5'); 
    colBox = color('#e63f31'); 
    
    baseBgColor = colBgLight;
    currentTextColor = color(180, 180, 180);
    
    textFont('Google Sans');

    checkSupport();
    if (isSupported) {
        initElements();
        resetGame();
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    checkSupport();
    
    if (isSupported) {
        initElements();
        if (state === 'TITLE') {
            boxX = bar1.x;
            updateBoxY();
        }
    }
}

function checkSupport() {
    if (windowWidth > 600 || (windowWidth / windowHeight) >= 0.75) {
        isSupported = false;
    } else {
        isSupported = true;
    }
}

// p5.js 환경용 완벽한 Cubic-Bezier 솔버
function getEasing(x, x1, y1, x2, y2) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    let lower = 0, upper = 1, t = x;
    for (let i = 0; i < 15; i++) {
        let currentX = bezierPoint(0, x1, x2, 1, t);
        if (currentX < x) lower = t;
        else upper = t;
        t = (upper + lower) / 2;
    }
    return bezierPoint(0, y1, y2, 1, t);
}

function initElements() {
    W = width;
    H = height;
    
    barWidth = W * 0.21;
    barHeight = H * 0.009;
    boxSize = min(W, H) * 0.07;
    
    currentBoxSize = boxSize; 
    
    baseSpeedX = W / 60;
    amplitude = H * 0.12;
    
    baseline = H / 2 - barHeight / 2 - boxSize / 2;

    if (!bar1) bar1 = {};
    if (!bar2) bar2 = {};

    bar1.x = W * 0.25;
    bar2.x = W * 0.75;

    if (effectiveBarWidth === undefined) effectiveBarWidth = barWidth;
}

function resetGame() {
    state = 'TITLE';
    score = 0;
    waveDirection = -1;
    yOffset = 0;
    
    ripples = []; // 모든 파동 초기화
    baseBgColor = colBgLight;
    baseGridAlpha = 255;
    isDarkMode = false;
    gradientAlpha = 0;
    titleSlideProgress = -W * 0.5;
    titleAlpha = 0;
    bestScoreSlideProgress = -W * 0.5; // [신규]
    bestScoreAlpha = 0;
    spinSpeed = 0;
    scorePopScale = 1;

    // 카메라를 원점(중앙 / 줌1 / 기울기0)으로 초기화
    camX = W / 2;
    camY = H / 2;
    camZoom = 1;
    camTilt = 0;
    
    currentBoxSize = boxSize; 
    boxHollowLerp = 0; 
    
    bar1.isHollow = false;
    bar2.isHollow = true;
    
    clearBarStates(bar1);
    clearBarStates(bar2);
    
    bar1.cleared = true;

    // [신규] 막대 팝 이펙트 상태 초기화
    bar1.popScale = 1;
    bar2.popScale = 1;
    
    boxX = bar1.x;
    updateBoxY();
    boxAngle = 0;
}

function triggerGameOver() {
    bestScore = max(bestScore, score);
    state = 'GAMEOVER_SLOWDOWN';
    gameOverExpandProgress = 0; 
}

function clearBarStates(bar) {
    bar.cleared = false;
    bar.pendingTrigger = false;
}

// [신규] 점수 기반 난이도 단계 계산
function getDifficultyTier() {
    return Math.floor(score / TIER_SCORE_STEP);
}

// [신규] 난이도가 오를수록 막대 폭(= 실제 탭 판정 범위)이 점점 좁아지도록 부드럽게 갱신
function updateDifficultyParams() {
    let widthMultiplier = max(0.55, 1 - getDifficultyTier() * 0.08);
    let targetWidth = barWidth * widthMultiplier;
    effectiveBarWidth = lerp(effectiveBarWidth, targetWidth, 0.05);
}

function randomizeBars() {
    // [수정] 점수에 따라 패턴을 뽑음
    let bars = [bar1, bar2];
    let prevHollow = bars.map(b => b.isHollow);

    // [신규] 난이도가 오를수록 "여러 막대를 연속으로 정확히 탭해야 하는" 패턴이 더 자주 등장
    let multiHollowChance = min(0.5, 0.12 + getDifficultyTier() * 0.04);

    if (random() < multiHollowChance) {
        bars.forEach(b => b.isHollow = true);
    } else {
        bars.forEach(b => b.isHollow = random() > 0.5);
        if (bars.every(b => !b.isHollow)) {
            bars[Math.floor(random() * bars.length)].isHollow = true;
        }
    }

    // 막대 모양이 실제로 바뀐 경우에만 팝 이펙트 트리거
    bars.forEach((b, i) => {
        if (b.isHollow !== prevHollow[i]) b.popScale = BAR_POP_SCALE;
    });
}

function updateBoxY() {
    let rad = (boxX / W) * 2 * PI;
    let idealY = baseline - waveDirection * amplitude * cos(rad);
    
    yOffset *= 0.7;
    if (abs(yOffset) < 0.1) yOffset = 0;
    
    boxY = idealY + yOffset;
}

// [핵심 변경] 깜빡임 원천 차단을 위한 다중 파동(Ripple) 렌더링 시스템
function renderBackgroundAndGrid() {
    // [수정] 카메라가 박스를 따라 원래 캔버스 범위 밖으로 이동/확대돼도
    // 절대 빈틈이 보이지 않도록 충분히 큰 사각형으로 배경을 채움 + 페이지(body) 배경색도 항상 동기화
    let bgMargin = W * 2;
    document.body.style.backgroundColor = baseBgColor.toString();

    // 1. 가장 밑바탕(Base) 렌더링
    push();
    noStroke();
    fill(baseBgColor);
    rectMode(CORNER);
    rect(-bgMargin, -bgMargin, W + bgMargin * 2, H + bgMargin * 2);
    pop();
    drawSpecificGrid(baseGridAlpha);
    
    // 그라디언트 드로우 (상단 검정 > 투명)
    if (gradientAlpha > 0) {
        drawingContext.save();
        let gradHeight = H * 0.4;
        let gradient = drawingContext.createLinearGradient(0, 0, 0, gradHeight);
        gradient.addColorStop(0, `rgba(0, 0, 0, ${map(gradientAlpha, 0, 255, 0, 0.9)})`);
        gradient.addColorStop(1, `rgba(0, 0, 0, 0)`);
        drawingContext.fillStyle = gradient;
        drawingContext.fillRect(0, 0, W, gradHeight);
        drawingContext.restore();
    }

    // 2. 누적된 파동들을 순차적으로 덮어씌움 (빠르게 클릭해도 에러 없음)
    for (let i = 0; i < ripples.length; i++) {
        let r = ripples[i];
        
        // [요청] 새로운 파동 속도 및 모션 커브 적용 (cubic-bezier(.04,.53,.5,.95))
        r.progress += 0.018; 
        let easedT = getEasing(r.progress, 0.04, 0.53, 0.5, 0.95);
        let currentRadius = dist(0, 0, W, H) * easedT;

        drawingContext.save();
        drawingContext.beginPath();
        drawingContext.arc(r.x, r.y, currentRadius, 0, TWO_PI);
        drawingContext.clip();

        push();
        rectMode(CORNER);
        noStroke();
        fill(r.targetBg);
        rect(-bgMargin, -bgMargin, W + bgMargin * 2, H + bgMargin * 2);
        pop();

        drawSpecificGrid(r.targetGridAlpha);
        drawingContext.restore();
    }

    // 3. 완전히 화면을 덮은 파동은 제거하고 바탕색(Base)으로 편입
    while (ripples.length > 0 && ripples[0].progress >= 1) {
        baseBgColor = ripples[0].targetBg;
        baseGridAlpha = ripples[0].targetGridAlpha;
        ripples.shift();
    }

    // 4. 게임 오버 시 부드럽게 라이트모드 톤으로 회귀
    if (state === 'GAMEOVER_SLOWDOWN' || state === 'GAMEOVER_RETURN') {
        baseBgColor = lerpColor(baseBgColor, colBgLight, 0.03);
        baseGridAlpha = lerp(baseGridAlpha, 255, 0.03);
        gradientAlpha = lerp(gradientAlpha, 0, 0.03);
        for (let r of ripples) {
            r.targetBg = lerpColor(r.targetBg, colBgLight, 0.03);
            r.targetGridAlpha = lerp(r.targetGridAlpha, 255, 0.03);
        }
    }
}

function drawSpecificGrid(alphaVal) {
    push();
    translate(W / 2, H / 2);
    let inverseScale = 1 / scorePopScale;
    scale(inverseScale);
    translate(-W / 2, -H / 2);
    
    stroke(215, 215, 215, alphaVal); 
    strokeWeight(1);
    
    let gridSize = min(W, H) * 0.085; 
    // [신규] 화면 바깥까지 격자를 확장 (게임오버 시 카메라가 따라가며 줌/이동해도 빈 배경이 보이지 않게)
    let margin = W * 2;
    for (let x = -margin; x < W + margin; x += gridSize) line(x, -margin, x, H + margin);
    for (let y = -margin; y < H + margin; y += gridSize) line(-margin, y, W + margin, y);
    pop();
}

// 깜빡임 방지를 위해 텍스트 색상도 부드럽게 페이드(Lerp) 처리
function drawCenterText(str) {
    let targetTextColor = isDarkMode ? color(255, 255, 255, 45) : color(180, 180, 180);
    currentTextColor = lerpColor(currentTextColor, targetTextColor, 0.1);

    push();
    translate(W / 2, H / 2);
    scale(scorePopScale);
    textAlign(CENTER, CENTER);
    textSize(W * 0.65); 
    // [신규] 텍스트 안쪽도 살짝 채워줌 (불투명도 20%)
    fill(red(currentTextColor), green(currentTextColor), blue(currentTextColor), 255 * 0.1);
    strokeWeight(2); 
    stroke(currentTextColor); 
    text(str, 0, 0);
    pop();
}

// [신규] 트렌디하고 감각적인 메인 타이틀 렌더링
function drawTrendyTitle() {
    // [신규] 폰트 크기와 줄간격을 모두 W(가로폭/vw) 기준으로만 계산.
    // H에 의존하지 않으므로 화면의 vw(가로세로 비율)가 달라져도 줄간격 비율이 항상 동일함
    let titleSize = W * 0.2;
    let lineGap = titleSize * 0.88; // "TAP2" -> "START" 줄간격
    
    // "TAP2" / "START" - 왼쪽에서 오른쪽으로 슬라이드인, 나갈때 왼쪽으로 슬라이드아웃
    let titleSlideOffset = map(titleSlideProgress, -W * 0.5, 0, -W * 0.5, 0);
    push();
    translate(W * 0.05 + titleSlideOffset, H * 0.25);
    textAlign(LEFT, CENTER);
    
    // "TAP2" (흰색, 아웃라인 없음)
    textSize(titleSize);
    fill(255, 255, 255, titleAlpha);
    noStroke();
    text("TAP2", 0, 0);
    
    // "START" (흰색, 아웃라인 없음, 줄바꿈 - 간격 좁게)
    textSize(titleSize);
    fill(255, 255, 255, titleAlpha);
    noStroke();
    text("START", 0, lineGap);
    pop();
    
    // [신규] BEST SCORE는 타이틀과 별도의(살짝 지연된) 슬라이드/알파 값을 사용해서
    // 타이틀이 먼저 움직이고 BEST SCORE가 살짝 나중에 따라오도록 함
    if (bestScore > 0) {
        let bestScoreSlideOffset = map(bestScoreSlideProgress, -W * 0.5, 0, -W * 0.5, 0);
        push();
        translate(W * 0.05 + bestScoreSlideOffset, H * 0.25);
        textAlign(LEFT, CENTER);
        textSize(titleSize * 0.175);
        fill(255, 255, 255, map(bestScoreAlpha, 0, 255, 0, 200));
        text("BEST SCORE : " + bestScore, 0, lineGap + titleSize * 0.58);
        pop();
    }
}

function draw() {
    if (!isSupported) {
        background(isDarkMode ? colBgDark : colBgLight);
        fill(isDarkMode ? colBarDark : colBarLight);
        noStroke(); textAlign(CENTER, CENTER);
        textSize(min(W, H) * 0.06); text("지원하지 않는 해상도입니다.", W / 2, H / 2 - 20);
        textSize(min(W, H) * 0.04); text("모바일 세로 모드에서 플레이해주세요.", W / 2, H / 2 + 20);
        return;
    }

    // [신규] 카메라 트랜스폼 적용 시작
    // camX, camY 지점이 화면 정중앙에 오도록 이동 -> 회전(틸트) -> 확대(줌)
    push();
    translate(W / 2, H / 2);
    rotate(camTilt);
    scale(camZoom);
    translate(-camX, -camY);

    renderBackgroundAndGrid();

    if (state === 'TITLE') {
        boxX = bar1.x;
        boxAngle = 0;
        updateBoxY();

        // 카메라는 항상 원점(중앙/줌1/기울기0) 고정
        camX = W / 2;
        camY = H / 2;
        camZoom = 1;
        camTilt = 0;
        
        drawCenterText(score); // 거대한 배경 숫자 0
        gradientAlpha = lerp(gradientAlpha, 255, 0.08);
        titleSlideProgress = lerp(titleSlideProgress, 0, 0.08);
        titleAlpha = lerp(titleAlpha, 255, 0.08);
        // [신규] BEST SCORE는 타이틀(TAP2/START)의 움직임을 살짝 늦게 뒤따라감
        bestScoreSlideProgress = lerp(bestScoreSlideProgress, titleSlideProgress, 0.1);
        bestScoreAlpha = lerp(bestScoreAlpha, titleAlpha, 0.1);
        spinSpeed = lerp(spinSpeed, 0, 0.1);
        scorePopScale = lerp(scorePopScale, 1, 0.1);
        
    } else if (state === 'PLAY') {
        gradientAlpha = lerp(gradientAlpha, 0, 0.05);
        titleSlideProgress = lerp(titleSlideProgress, -W * 0.5, 0.08);
        titleAlpha = lerp(titleAlpha, 0, 0.08);
        // [신규] BEST SCORE는 타이틀의 움직임을 살짝 늦게 뒤따라감
        bestScoreSlideProgress = lerp(bestScoreSlideProgress, titleSlideProgress, 0.1);
        bestScoreAlpha = lerp(bestScoreAlpha, titleAlpha, 0.1);
        spinSpeed = lerp(spinSpeed, 0, 0.05);
        scorePopScale = lerp(scorePopScale, 1, 0.1);

        // 카메라는 항상 원점(중앙/줌1/기울기0) 고정
        camX = W / 2;
        camY = H / 2;
        camZoom = 1;
        camTilt = 0;

        let speedMultiplier = 0.8 + Math.floor(score / 10) * 0.1;
        currentSpeed = baseSpeedX * speedMultiplier;

        let prevX = boxX;
        boxX += currentSpeed;
        boxAngle += currentSpeed * 0.01 + spinSpeed;

        checkBufferedTrigger(bar1, prevX, boxX);
        checkBufferedTrigger(bar2, prevX, boxX);
        checkMiss(bar1, prevX, boxX);
        checkMiss(bar2, prevX, boxX);

        if (boxX >= W) {
            boxX -= W; 
            clearBarStates(bar1);
            clearBarStates(bar2);
            randomizeBars();
        }

        updateBoxY();
        drawCenterText(score);
        
    } else if (state === 'GAMEOVER_SLOWDOWN') {
        gameOverExpandProgress += 0.025; 
        if (gameOverExpandProgress > 1) gameOverExpandProgress = 1;
        
        let easedT = getEasing(gameOverExpandProgress, 0, 0.03, 0, 1.01);
        currentBoxSize = boxSize + (boxSize * 3 - boxSize) * easedT; 
        boxHollowLerp = easedT; 

        currentSpeed *= 0.94; 
        boxX += currentSpeed;
        boxAngle += currentSpeed * 0.01;
        
        // [변경] 플레이어가 죽은 상태에서는 우측 -> 좌측으로 워프하는 로직을 끔
        // (카메라가 따라가며 박스가 화면 밖으로 자연스럽게 빠져나가게 함)
        
        updateBoxY();

        // [신규] 카메라가 플레이어(상자)를 따라가며 확대 + 기울어짐
        camX = lerp(camX, boxX, 0.15);
        camY = lerp(camY, boxY, 0.15);
        camZoom = lerp(1, CAM_ZOOM_MAX, boxHollowLerp);
        camTilt = lerp(0, CAM_TILT_MAX, boxHollowLerp);

        drawCenterText("WTF");

        if (abs(currentSpeed) < 0.2) {
            currentSpeed = 0;
            state = 'GAMEOVER_RETURN';
            isDarkMode = false; // 리와인드 시 강제로 라이트모드 복귀 시작
            
            returnProgress = 0;
            returnStartX = boxX;
            returnStartY = boxY;
            returnStartAngle = boxAngle;
            returnStartSize = currentBoxSize;

            // [신규] 카메라 복귀 애니메이션의 시작값 캡처
            camReturnStartX = camX;
            camReturnStartY = camY;
            camReturnStartZoom = camZoom;
            camReturnStartTilt = camTilt;
        }

    } else if (state === 'GAMEOVER_RETURN') {
        returnProgress += 0.015; 
        if (returnProgress > 1) returnProgress = 1;
        
        titleSlideProgress = lerp(titleSlideProgress, 0, 0.08);
        titleAlpha = lerp(titleAlpha, 255, 0.08);
        
        let easedT = getEasing(returnProgress, 0.79, 0.01, 0.25, 1);

        let targetX = bar1.x;
        let targetY = baseline;
        let targetAngle = round(returnStartAngle / TWO_PI) * TWO_PI;

        boxX = lerp(returnStartX, targetX, easedT);
        boxY = lerp(returnStartY, targetY, easedT);
        boxAngle = lerp(returnStartAngle, targetAngle, easedT);
        currentBoxSize = lerp(returnStartSize, boxSize, easedT);
        boxHollowLerp = lerp(1, 0, easedT); 

        // [신규] 플레이어가 원점으로 돌아가는 것과 동일한 이징으로
        // 카메라도 원점(중앙 / 줌1 / 기울기0)으로 함께 복귀
        camX = lerp(camReturnStartX, W / 2, easedT);
        camY = lerp(camReturnStartY, H / 2, easedT);
        camZoom = lerp(camReturnStartZoom, 1, easedT);
        camTilt = lerp(camReturnStartTilt, 0, easedT);
        
        drawCenterText("WTF");

        if (returnProgress >= 1) {
            resetGame();
        }
    }

    // [신규] 타이틀(TAP2 START / BEST SCORE)을 TITLE <-> PLAY 전환 동안
    // 계속 그려줘서 즉시 사라지지 않고 왼쪽으로 슬라이드+페이드되며 자연스럽게 사라지게 함
    if ((state === 'TITLE' || state === 'PLAY') && (titleAlpha > 1 || bestScoreAlpha > 1)) {
        drawTrendyTitle();
    }

    drawBars();
    drawBox();

    pop();
    // [신규] 카메라 트랜스폼 적용 끝
}

function checkBufferedTrigger(bar, pX, cX) {
    if (bar.pendingTrigger && pX <= bar.x && cX >= bar.x) {
        executeSuccess(bar);
        bar.pendingTrigger = false;
    }
}

function checkMiss(bar, pX, cX) {
    let rightEdge = bar.x + barWidth / 2;
    if (pX <= rightEdge && cX > rightEdge) {
        if (bar.isHollow && !bar.cleared) {
            triggerGameOver(); 
        }
    }
}

function executeSuccess(bar) {
    score++;
    scorePopScale = 1.3;
    
    let rad = (boxX / W) * 2 * PI;
    let oldIdealY = baseline - waveDirection * amplitude * cos(rad);
    waveDirection *= -1; 
    let newIdealY = baseline - waveDirection * amplitude * cos(rad);
    yOffset = (boxY - newIdealY);
    
    boxAngle += TWO_PI * 0.5;
    spinSpeed = 0.3;
    
    bar.cleared = true;
    randomizeBars(); 

    isDarkMode = !isDarkMode;
    
    // [신규] 다중 파동(Ripple) 배열에 새로운 애니메이션 객체 추가
    ripples.push({
        x: bar.x,
        y: H / 2,
        progress: 0,
        targetBg: isDarkMode ? colBgDark : colBgLight,
        targetGridAlpha: isDarkMode ? 15 : 255
    });
}

function drawBars() {
    rectMode(CENTER);
    drawBar(bar1);
    drawBar(bar2);
}

function drawBar(bar) {
    // [신규] 막대 교체 팝 이펙트를 매 프레임 원래 상태로 부드럽게 복원
    bar.popScale = lerp(bar.popScale, 1, 0.2);

    let mainColor = isDarkMode ? colBarDark : colBarLight;
    
    push();
    translate(bar.x, H / 2);
    scale(bar.popScale);
    
    if (bar.isHollow) {
        noFill(); stroke(mainColor); strokeWeight(min(W, H) * 0.009);
    } else {
        fill(mainColor); noStroke();
    }
    rect(0, 0, barWidth, barHeight, barHeight / 2);
    pop();
}

function drawBox() {
    drawSingleBox(boxX, boxY);
    // [변경] 화면 양끝에 박스를 복제해서 보여주는 건 좌우 워프가 실제로 일어나는 PLAY 상태에서만 필요함
    if (state === 'PLAY') {
        if (boxX > W - currentBoxSize) drawSingleBox(boxX - W, boxY);
        if (boxX < currentBoxSize) drawSingleBox(boxX + W, boxY);
    }
}

function drawSingleBox(x, y) {
    push();
    translate(x, y);
    rotate(boxAngle);
    
    let alphaFill = map(boxHollowLerp, 0, 1, 255, 0); 
    let alphaStroke = map(boxHollowLerp, 0, 1, 0, 255); 
    
    fill(230, 63, 49, alphaFill); 
    stroke(230, 63, 49, alphaStroke);
    
    strokeWeight(boxSize * 0.15); 
    
    rectMode(CENTER);
    rect(0, 0, currentBoxSize, currentBoxSize, currentBoxSize * 0.15);
    pop();
}

function mousePressed() {
    if (!isSupported) return;

    if (state === 'TITLE') {
        state = 'PLAY';
    } else if (state === 'PLAY') {
        let hitBar = null;
        
        if (abs(boxX - bar1.x) <= barWidth / 2) hitBar = bar1;
        else if (abs(boxX - bar2.x) <= barWidth / 2) hitBar = bar2;

        if (hitBar) {
            if (hitBar.isHollow && !hitBar.cleared) {
                if (boxX < hitBar.x) hitBar.pendingTrigger = true;
                else executeSuccess(hitBar);
            } else {
                triggerGameOver(); 
            }
        } else {
            triggerGameOver(); 
        }
    } 
}
</script>
