<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <title>tap 2 start</title>
    <style>
        @font-face {
            font-family: 'Google Sans';
            src: url('https://fonts.gstatic.com/s/googlesans/v29/4UaGrENHsxJlGDuGo1OIlL3Owp4.woff2') format('woff2');
            font-weight: bold;
        }
        body { margin: 0; padding: 0; background-color: #f5f5f5; overflow: hidden; touch-action: none; font-family: 'Google Sans', sans-serif; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
<script>
let state = 'TITLE'; 
let score = 0;
let bestScore = 0;

let W, H;
let boxX, boxY, boxAngle = 0;
let baseSpeedX;
let currentSpeed = 0;
let amplitude;
let baseline;
let waveDirection = -1;
let yOffset = 0;

let boxSize;
let currentBoxSize; 
let boxHollowLerp = 0; 

let bar1, bar2;
let barWidth, barHeight;
let effectiveBarWidth; // [신규] 난이도에 따라 점점 좁아지는 "실제 탭 판정" 폭

let gameOverExpandProgress = 0;
let returnProgress = 0;
let returnStartX, returnStartY, returnStartAngle, returnStartSize;

let isDarkMode = false;

// [신규] 배경 깜빡임(Flash) 방지를 위한 다중 파동(Ripple) 배열 시스템
let ripples = [];
let baseBgColor;
let baseGridAlpha = 255;
let currentTextColor;

// [신규] 게임오버 카메라(따라가기 + 확대 + 기울임) 상태값
let camX, camY, camZoom, camTilt;
let camReturnStartX, camReturnStartY, camReturnStartZoom, camReturnStartTilt;
const CAM_ZOOM_MAX = 1.4;   // 게임오버 시 최대 줌
const CAM_TILT_MAX = -0.12; // 게임오버 시 최대 기울기(라디안)
const BAR_POP_SCALE = 1.35;   // 막대 모양이 바뀔 때 팝 이펙트 최대 크기
const TIER_SCORE_STEP = 15;   // [신규] 난이도 단계가 한 단계 오르는 점수 간격

let colBgLight, colBgDark, colBarLight, colBarDark, colBox;
let isSupported = true;
let gradientAlpha = 255;
let titleSlideProgress = 0;
let titleAlpha = 255;
let bestScoreSlideProgress = 0; // [신규] BEST SCORE가 타이틀보다 살짝 늦게 따라오도록
let bestScoreAlpha = 0;
let spinSpeed = 0;
let scorePopScale = 1;

// [추가] HOW TO PLAY 버튼 애니메이션 오프셋
let howToPlayYOffset = 0;

// [버그 수정 #2] 절전모드 등으로 프레임 간격이 길어져도 속도가 느려지지 않도록
// 매 프레임 보정해주는 시간 스케일 값 (1.0 = 이상적인 60fps 기준 한 프레임)
let dt = 1;

// [신규 #4] 메인 화면 하단 "HOW TO PLAY" 버튼 + 튜토리얼 진행 상태
let tutorialStep = 0;          // 0: 채워진 막대 설명, 1: 빈 막대 설명, 2: 연습, 3: 완료
let tutorialPracticeHits = 0;
const TUTORIAL_PRACTICE_TARGET = 3;
let tutorialFeedbackText = '';
let tutorialFeedbackAlpha = 0;

// [버그 수정 #1] Android 등에서 touchstart 이후 합성(ghost) mousedown이 한 번 더 발생해
// 한 번의 탭이 두 번 처리되거나 "누른 상태에 갇히는" 현상을 막기 위한 디바운스 타임스탬프
let lastInputTime = -1000;
const INPUT_DEBOUNCE_MS = 80;

const BEST_SCORE_STORAGE_KEY = 'tap2start_bestScore'; // [신규 #3] 로컬 최고기록 저장 키

let audioCtx;
function playTone(freq,duration){
 if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 const osc=audioCtx.createOscillator();
 const gain=audioCtx.createGain();
 osc.type='square';
 osc.frequency.value=freq;
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 gain.gain.setValueAtTime(0.03,audioCtx.currentTime);
 gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration);
 osc.start();
 osc.stop(audioCtx.currentTime+duration);
}
function successFx(){
 playTone(950,0.03);
 setTimeout(()=>playTone(1250,0.02),30);
 if(navigator.vibrate) navigator.vibrate(15);
}
function failFx(){
 playTone(300,0.08);
 setTimeout(()=>playTone(180,0.15),60);
 if(navigator.vibrate) navigator.vibrate([35,50,35,50,60]);
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    colBgLight = color('#f5f5f5');
    colBgDark = color('#1d1d1d'); 
    colBarLight = color('#1d1d1d'); 
    colBarDark = color('#f5f5f5'); 
    colBox = color('#e63f31'); 
    
    baseBgColor = colBgLight;
    currentTextColor = color(180, 180, 180);
    
    textFont('Google Sans');

    // [신규 #3] 로컬에 저장된 최고 기록 불러오기 (프라이빗 모드 등에서 실패해도 게임은 계속 진행)
    try {
        let saved = localStorage.getItem(BEST_SCORE_STORAGE_KEY);
        if (saved !== null) bestScore = parseInt(saved, 10) || 0;
    } catch (e) {
        console.warn('localStorage를 사용할 수 없어 최고 기록을 불러오지 못했습니다.', e);
    }

    checkSupport();
    if (isSupported) {
        initElements();
        resetGame();
    }

    bindInputEvents(); // [버그 수정 #1] p5 기본 mousePressed 대신 전용 입력 핸들러 사용
}

// [버그 수정 #1] Android 일부 브라우저에서 touchstart 직후 합성된 mousedown이 또 발생해
// 하나의 탭이 두 번 처리되거나, 내부적으로 "누른 상태"에 갇혀서 다음 탭이 무시되는 현상이 있었음.
// p5의 자동 mousePressed 콜백(내부적으로 눌림 상태를 추적함) 대신, 캔버스에 직접
// touchstart/mousedown 리스너를 달아 매번 "새로운 탭"으로 독립적으로 처리하고,
// 항상 preventDefault로 합성 이벤트 자체를 차단 + 짧은 디바운스로 중복 입력을 무시한다.
function bindInputEvents() {
    let canvasElt = document.querySelector('canvas');
    if (!canvasElt) return;

    canvasElt.addEventListener('touchstart', function (e) {
        e.preventDefault();
        let t = e.changedTouches && e.changedTouches[0];
        if (t) handleRawTap(t.clientX, t.clientY);
    }, { passive: false });

    canvasElt.addEventListener('mousedown', function (e) {
        e.preventDefault();
        handleRawTap(e.clientX, e.clientY);
    });

    // 길게 누르기로 컨텍스트 메뉴/텍스트 선택 등이 뜨면서 입력이 꼬이는 것을 방지
    canvasElt.addEventListener('touchend', function (e) { e.preventDefault(); }, { passive: false });
    canvasElt.addEventListener('touchcancel', function (e) { e.preventDefault(); }, { passive: false });
    canvasElt.addEventListener('contextmenu', function (e) { e.preventDefault(); });
}

function handleRawTap(clientX, clientY) {
    let now = (window.performance ? performance.now() : Date.now());
    if (now - lastInputTime < INPUT_DEBOUNCE_MS) return; // 동일 탭에서 발생한 중복 이벤트 무시
    lastInputTime = now;

    let canvasElt = document.querySelector('canvas');
    let rect = canvasElt ? canvasElt.getBoundingClientRect() : { left: 0, top: 0 };
    onTap(clientX - rect.left, clientY - rect.top);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    checkSupport();
    
    if (isSupported) {
        initElements();
        if (state === 'TITLE') {
            boxX = bar1.x;
            updateBoxY();
        }
    }
}

function checkSupport() {
    if (windowWidth > 600 || (windowWidth / windowHeight) >= 0.75) {
        isSupported = false;
    } else {
        isSupported = true;
    }
}

// p5.js 환경용 완벽한 Cubic-Bezier 솔버
function getEasing(x, x1, y1, x2, y2) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    let lower = 0, upper = 1, t = x;
    for (let i = 0; i < 15; i++) {
        let currentX = bezierPoint(0, x1, x2, 1, t);
        if (currentX < x) lower = t;
        else upper = t;
        t = (upper + lower) / 2;
    }
    return bezierPoint(0, y1, y2, 1, t);
}

// [버그 수정 #2] 보간 계수를 프레임 시간(dt)에 맞게 보정.
// 절전모드 등으로 프레임이 평소보다 늦게 와도(=dt가 커짐) 같은 "실제 시간" 동안
// 같은 비율만큼 움직이도록 만들어 체감 속도가 느려지지 않게 한다.
function lerpDT(current, target, amt) {
    return lerp(current, target, 1 - Math.pow(1 - amt, dt));
}

function lerpColorDT(c1, c2, amt) {
    return lerpColor(c1, c2, 1 - Math.pow(1 - amt, dt));
}

function initElements() {
    W = width;
    H = height;
    
    barWidth = W * 0.21;
    barHeight = H * 0.009;
    boxSize = min(W, H) * 0.07;
    
    currentBoxSize = boxSize; 
    
    baseSpeedX = W / 60;
    amplitude = H * 0.12;
    
    baseline = H / 2 - barHeight / 2 - boxSize / 2;

    if (!bar1) bar1 = {};
    if (!bar2) bar2 = {};

    bar1.x = W * 0.25;
    bar2.x = W * 0.75;

    if (effectiveBarWidth === undefined) effectiveBarWidth = barWidth;
}

function resetGame() {
    state = 'TITLE';
    score = 0;
    waveDirection = -1;
    yOffset = 0;
    
    ripples = []; // 모든 파동 초기화
    baseBgColor = colBgLight;
    baseGridAlpha = 255;
    isDarkMode = false;
    gradientAlpha = 0;
    titleSlideProgress = -W * 0.5;
    titleAlpha = 0;
    bestScoreSlideProgress = -W * 0.5; // [신규]
    bestScoreAlpha = 0;
    spinSpeed = 0;
    scorePopScale = 1;

    // 카메라는 항상 원점(중앙 / 줌1 / 기울기0) 고정
    camX = W / 2;
    camY = H / 2;
    camZoom = 1;
    camTilt = 0;
    
    currentBoxSize = boxSize; 
    boxHollowLerp = 0; 
    
    bar1.isHollow = false;
    bar2.isHollow = true;
    
    clearBarStates(bar1);
    clearBarStates(bar2);
    
    bar1.cleared = true;

    // 막대 팝 이펙트 상태 초기화
    bar1.popScale = 1;
    bar2.popScale = 1;
    
    // 튜토리얼 오버레이도 함께 초기화
    tutorialStep = 0;
    tutorialPracticeHits = 0;
    tutorialFeedbackAlpha = 0;

    boxX = bar1.x;
    updateBoxY();
    boxAngle = 0;
}

function triggerGameOver() {
    failFx();
    bestScore = max(bestScore, score);
    // [신규 #3] 최고 기록을 로컬에 저장해서 다음에 다시 들어와도 유지되게 함
    try {
        localStorage.setItem(BEST_SCORE_STORAGE_KEY, String(bestScore));
    } catch (e) {
        // 프라이빗 모드 등 저장이 안 되는 환경이면 조용히 무시하고 진행
    }
    state = 'GAMEOVER_SLOWDOWN';
    gameOverExpandProgress = 0; 
}

function clearBarStates(bar) {
    bar.cleared = false;
    bar.pendingTrigger = false;
}

// 점수 기반 난이도 단계 계산
function getDifficultyTier() {
    return Math.floor(score / TIER_SCORE_STEP);
}

// 난이도가 오를수록 막대 폭(= 실제 탭 판정 범위)이 점점 좁아지도록 부드럽게 갱신
function updateDifficultyParams() {
    let widthMultiplier = max(0.55, 1 - getDifficultyTier() * 0.08);
    let targetWidth = barWidth * widthMultiplier;
    effectiveBarWidth = lerp(effectiveBarWidth, targetWidth, 0.05);
}

function randomizeBars() {
    let bars = [bar1, bar2];
    let prevHollow = bars.map(b => b.isHollow);

    let multiHollowChance = min(0.5, 0.12 + getDifficultyTier() * 0.04);

    if (random() < multiHollowChance) {
        bars.forEach(b => b.isHollow = true);
    } else {
        bars.forEach(b => b.isHollow = random() > 0.5);
        if (bars.every(b => !b.isHollow)) {
            bars[Math.floor(random() * bars.length)].isHollow = true;
        }
    }

    // 막대 모양이 실제로 바뀐 경우에만 팝 이펙트 트리거
    bars.forEach((b, i) => {
        if (b.isHollow !== prevHollow[i]) b.popScale = BAR_POP_SCALE;
    });
}

function updateBoxY() {
    let rad = (boxX / W) * 2 * PI;
    let idealY = baseline - waveDirection * amplitude * cos(rad);
    
    yOffset *= Math.pow(0.7, dt); // 프레임 시간에 비례해 감쇠하도록 보정
    if (abs(yOffset) < 0.1) yOffset = 0;
    
    boxY = idealY + yOffset;
}

// 깜빡임 원천 차단을 위한 다중 파동(Ripple) 렌더링 시스템
function renderBackgroundAndGrid() {
    let bgMargin = W * 2;
    document.body.style.backgroundColor = baseBgColor.toString();

    // 1. 가장 밑바탕(Base) 렌더링
    push();
    noStroke();
    fill(baseBgColor);
    rectMode(CORNER);
    rect(-bgMargin, -bgMargin, W + bgMargin * 2, H + bgMargin * 2);
    pop();
    drawSpecificGrid(baseGridAlpha);
    
    // 그라디언트 드로우 (상단 검정 > 투명)
    if (gradientAlpha > 0) {
        drawingContext.save();
        let gradHeight = H * 0.5;
        let gradient = drawingContext.createLinearGradient(0, 0, 0, gradHeight);
        gradient.addColorStop(0, `rgba(0, 0, 0, ${map(gradientAlpha, 0, 255, 0, 0.9)})`);
        gradient.addColorStop(1, `rgba(0, 0, 0, 0)`);
        drawingContext.fillStyle = gradient;
        drawingContext.fillRect(0, 0, W, gradHeight);
        drawingContext.restore();
    }

    // 2. 누적된 파동들을 순차적으로 덮어씌움 (빠르게 클릭해도 에러 없음)
    for (let i = 0; i < ripples.length; i++) {
        let r = ripples[i];
        
        // [수정] 새로운 파동 속도 조절 (더 느리고 부드럽게)
        r.progress += 0.009 * dt; 
        let easedT = getEasing(r.progress, 0.04, 0.53, 0.5, 0.95);
        let currentRadius = dist(0, 0, W, H) * easedT;

        drawingContext.save();
        drawingContext.beginPath();
        drawingContext.arc(r.x, r.y, currentRadius, 0, TWO_PI);
        drawingContext.clip();

        push();
        rectMode(CORNER);
        noStroke();
        fill(r.targetBg);
        rect(-bgMargin, -bgMargin, W + bgMargin * 2, H + bgMargin * 2);
        pop();

        drawSpecificGrid(r.targetGridAlpha);
        drawingContext.restore();
    }

    // 3. 완전히 화면을 덮은 파동은 제거하고 바탕색(Base)으로 편입
    while (ripples.length > 0 && ripples[0].progress >= 1) {
        baseBgColor = ripples[0].targetBg;
        baseGridAlpha = ripples[0].targetGridAlpha;
        ripples.shift();
    }

    // 4. 게임 오버 시 부드럽게 라이트모드 톤으로 회귀
    if (state === 'GAMEOVER_SLOWDOWN' || state === 'GAMEOVER_RETURN') {
        baseBgColor = lerpColorDT(baseBgColor, colBgLight, 0.03);
        baseGridAlpha = lerpDT(baseGridAlpha, 255, 0.03);
        gradientAlpha = lerpDT(gradientAlpha, 0, 0.03);
        for (let r of ripples) {
            r.targetBg = lerpColorDT(r.targetBg, colBgLight, 0.03);
            r.targetGridAlpha = lerpDT(r.targetGridAlpha, 255, 0.03);
        }
    }
}

function drawSpecificGrid(alphaVal) {
    push();
    translate(W / 2, H / 2);
    let inverseScale = 1 / scorePopScale;
    scale(inverseScale);
    translate(-W / 2, -H / 2);
    
    stroke(215, 215, 215, alphaVal); 
    strokeWeight(1);
    
    let gridSize = min(W, H) * 0.085; 
    let margin = W * 2;
    for (let x = -margin; x < W + margin; x += gridSize) line(x, -margin, x, H + margin);
    for (let y = -margin; y < H + margin; y += gridSize) line(-margin, y, W + margin, y);
    pop();
}

// 깜빡임 방지를 위해 텍스트 색상도 부드럽게 페이드(Lerp) 처리
function drawCenterText(str) {
    let targetTextColor = isDarkMode ? color(255, 255, 255, 45) : color(180, 180, 180);
    currentTextColor = lerpColorDT(currentTextColor, targetTextColor, 0.1);

    push();
    translate(W / 2, H / 2);
    scale(scorePopScale);
    textAlign(CENTER, CENTER);
    textSize(W * 0.65); 
    fill(red(currentTextColor), green(currentTextColor), blue(currentTextColor), 255 * 0.1);
    strokeWeight(2); 
    stroke(currentTextColor); 
    text(str, 0, 0);
    pop();
}

// 트렌디하고 감각적인 메인 타이틀 렌더링
function drawTrendyTitle() {
    let titleSize = W * 0.2;
    let lineGap = titleSize * 0.88; 
    
    let titleSlideOffset = map(titleSlideProgress, -W * 0.5, 0, -W * 0.5, 0);
    push();
    translate(W * 0.05 + titleSlideOffset, H * 0.22);
    textAlign(LEFT, CENTER);
    
    textSize(titleSize);
    fill(255, 255, 255, titleAlpha);
    noStroke();
    text("TAP2", 0, 0);
    
    textSize(titleSize);
    fill(255, 255, 255, titleAlpha);
    noStroke();
    text("START", 0, lineGap);
    pop();
    
    if (bestScore > 0) {
        let bestScoreSlideOffset = map(bestScoreSlideProgress, -W * 0.5, 0, -W * 0.5, 0);
        push();
        translate(W * 0.05 + bestScoreSlideOffset, H * 0.22);
        textAlign(LEFT, CENTER);
        textSize(titleSize * 0.175);
        fill(255, 255, 255, map(bestScoreAlpha, 0, 255, 0, 200));
        text("BEST SCORE : " + bestScore, 0, lineGap + titleSize * 0.58);
        pop();
    }
}

function draw() {
    if (!isSupported) {
        background(isDarkMode ? colBgDark : colBgLight);
        fill(isDarkMode ? colBarDark : colBarLight);
        noStroke(); textAlign(CENTER, CENTER);
        textSize(min(W, H) * 0.06); text("지원하지 않는 해상도입니다.", W / 2, H / 2 - 20);
        textSize(min(W, H) * 0.04); text("모바일 세로 모드에서 플레이해주세요.", W / 2, H / 2 + 20);
        return;
    }

    // 프레임 시간 보정 계수 계산
    dt = deltaTime / (1000 / 60);
    dt = constrain(dt, 0.0001, 3); 

    // 카메라 트랜스폼 적용 시작
    push();
    translate(W / 2, H / 2);
    rotate(camTilt);
    scale(camZoom);
    translate(-camX, -camY);

    renderBackgroundAndGrid();

    if (state === 'TITLE') {
        boxX = bar1.x;
        boxAngle = 0;
        updateBoxY();

        camX = W / 2;
        camY = H / 2;
        camZoom = 1;
        camTilt = 0;
        
        drawCenterText(score); 
        gradientAlpha = lerpDT(gradientAlpha, 255, 0.08);
        titleSlideProgress = lerpDT(titleSlideProgress, 0, 0.08);
        titleAlpha = lerpDT(titleAlpha, 255, 0.08);
        bestScoreSlideProgress = lerpDT(bestScoreSlideProgress, titleSlideProgress, 0.1);
        bestScoreAlpha = lerpDT(bestScoreAlpha, titleAlpha, 0.1);
        spinSpeed = lerpDT(spinSpeed, 0, 0.1);
        scorePopScale = lerpDT(scorePopScale, 1, 0.1);

        // [수정] 타이틀에서는 버튼이 원래 위치로 스르륵 올라옵니다.
        howToPlayYOffset = lerpDT(howToPlayYOffset, 0, 0.08);
        
    } else if (state === 'PLAY') {
        gradientAlpha = lerpDT(gradientAlpha, 0, 0.05);
        titleSlideProgress = lerpDT(titleSlideProgress, -W * 0.5, 0.08);
        titleAlpha = lerpDT(titleAlpha, 0, 0.08);
        bestScoreSlideProgress = lerpDT(bestScoreSlideProgress, titleSlideProgress, 0.1);
        bestScoreAlpha = lerpDT(bestScoreAlpha, titleAlpha, 0.1);
        spinSpeed = lerpDT(spinSpeed, 0, 0.05);
        scorePopScale = lerpDT(scorePopScale, 1, 0.1);

        // [수정] 게임 시작 시 버튼이 화면 아래로 숨습니다.
        howToPlayYOffset = lerpDT(howToPlayYOffset, H * 0.2, 0.08);

        camX = W / 2;
        camY = H / 2;
        camZoom = 1;
        camTilt = 0;

        let speedMultiplier = 0.8 + Math.floor(score / 10) * 0.1;
        currentSpeed = baseSpeedX * speedMultiplier;

        let prevX = boxX;
        boxX += currentSpeed * dt; 
        boxAngle += (currentSpeed * 0.01 + spinSpeed) * dt; 

        checkBufferedTrigger(bar1, prevX, boxX);
        checkBufferedTrigger(bar2, prevX, boxX);
        checkMiss(bar1, prevX, boxX);
        checkMiss(bar2, prevX, boxX);

        if (boxX >= W) {
            boxX -= W; 
            clearBarStates(bar1);
            clearBarStates(bar2);
            randomizeBars();
        }

        updateBoxY();
        drawCenterText(score);
        
    } else if (state === 'TUTORIAL') {
        camX = W / 2;
        camY = H / 2;
        camZoom = 1;
        camTilt = 0;

        gradientAlpha = lerpDT(gradientAlpha, 0, 0.08);
        titleSlideProgress = lerpDT(titleSlideProgress, -W * 0.5, 0.08);
        titleAlpha = lerpDT(titleAlpha, 0, 0.08);
        bestScoreSlideProgress = lerpDT(bestScoreSlideProgress, titleSlideProgress, 0.1);
        bestScoreAlpha = lerpDT(bestScoreAlpha, titleAlpha, 0.1);

        // [수정] 튜토리얼 진행 중에도 버튼을 숨깁니다.
        howToPlayYOffset = lerpDT(howToPlayYOffset, H * 0.2, 0.08);

        if (tutorialStep === 2) {
            let prevX = boxX;
            boxX += currentSpeed * dt;
            boxAngle += (currentSpeed * 0.01 + spinSpeed) * dt;
            spinSpeed = lerpDT(spinSpeed, 0, 0.1);

            checkTutorialBufferedTrigger(bar1, prevX, boxX);
            checkTutorialBufferedTrigger(bar2, prevX, boxX);
            checkTutorialMiss(bar1, prevX, boxX);
            checkTutorialMiss(bar2, prevX, boxX);

            if (boxX >= W) {
                boxX -= W;
                clearBarStates(bar1);
                clearBarStates(bar2);
                randomizeBars();
            }
            updateBoxY();
            drawCenterText(tutorialPracticeHits);
        } else {
            boxX = bar1.x;
            boxAngle = 0;
            updateBoxY();
        }

        drawTutorialOverlay();

    } else if (state === 'GAMEOVER_SLOWDOWN') {
        gameOverExpandProgress += 0.025 * dt; 
        if (gameOverExpandProgress > 1) gameOverExpandProgress = 1;
        
        let easedT = getEasing(gameOverExpandProgress, 0, 0.03, 0, 1.01);
        currentBoxSize = boxSize + (boxSize * 3 - boxSize) * easedT; 
        boxHollowLerp = easedT; 

        currentSpeed *= Math.pow(0.94, dt); 
        boxX += currentSpeed * dt; 
        boxAngle += currentSpeed * 0.01 * dt; 
        
        updateBoxY();

        camX = lerpDT(camX, boxX, 0.15);
        camY = lerpDT(camY, boxY, 0.15);
        camZoom = lerp(1, CAM_ZOOM_MAX, boxHollowLerp);
        camTilt = lerp(0, CAM_TILT_MAX, boxHollowLerp);

        drawCenterText("WTF");

        if (abs(currentSpeed) < 0.2) {
            currentSpeed = 0;
            state = 'GAMEOVER_RETURN';
            isDarkMode = false; 
            
            returnProgress = 0;
            returnStartX = boxX;
            returnStartY = boxY;
            returnStartAngle = boxAngle;
            returnStartSize = currentBoxSize;

            camReturnStartX = camX;
            camReturnStartY = camY;
            camReturnStartZoom = camZoom;
            camReturnStartTilt = camTilt;
        }

    } else if (state === 'GAMEOVER_RETURN') {
        returnProgress += 0.015 * dt; 
        if (returnProgress > 1) returnProgress = 1;
        
        titleSlideProgress = lerpDT(titleSlideProgress, 0, 0.08);
        titleAlpha = lerpDT(titleAlpha, 255, 0.08);
        
        let easedT = getEasing(returnProgress, 0.79, 0.01, 0.25, 1);

        let targetX = bar1.x;
        let targetY = baseline;
        let targetAngle = round(returnStartAngle / TWO_PI) * TWO_PI;

        boxX = lerp(returnStartX, targetX, easedT);
        boxY = lerp(returnStartY, targetY, easedT);
        boxAngle = lerp(returnStartAngle, targetAngle, easedT);
        currentBoxSize = lerp(returnStartSize, boxSize, easedT);
        boxHollowLerp = lerp(1, 0, easedT); 

        camX = lerp(camReturnStartX, W / 2, easedT);
        camY = lerp(camReturnStartY, H / 2, easedT);
        camZoom = lerp(camReturnStartZoom, 1, easedT);
        camTilt = lerp(camReturnStartTilt, 0, easedT);
        
        drawCenterText("WTF");

        if (returnProgress >= 1) {
            resetGame();
        }
    }

    if ((state === 'TITLE' || state === 'PLAY') && (titleAlpha > 1 || bestScoreAlpha > 1)) {
        drawTrendyTitle();
        drawHowToPlayButton(titleAlpha); 
    }

    drawBars();
    drawBox();

    pop();
    // 카메라 트랜스폼 적용 끝
}

function checkBufferedTrigger(bar, pX, cX) {
    if (bar.pendingTrigger && pX <= bar.x && cX >= bar.x) {
        executeSuccess(bar);
        bar.pendingTrigger = false;
    }
}

function checkMiss(bar, pX, cX) {
    let rightEdge = bar.x + barWidth / 2;
    if (pX <= rightEdge && cX > rightEdge) {
        if (bar.isHollow && !bar.cleared) {
            triggerGameOver(); 
        }
    }
}

function executeSuccess(bar) {
    score++;
    successFx();
    scorePopScale = 1.3;
    
    let rad = (boxX / W) * 2 * PI;
    let oldIdealY = baseline - waveDirection * amplitude * cos(rad);
    waveDirection *= -1; 
    let newIdealY = baseline - waveDirection * amplitude * cos(rad);
    yOffset = (boxY - newIdealY);
    
    boxAngle += TWO_PI * 0.5;
    spinSpeed = 0.3;
    
    bar.cleared = true;
    randomizeBars(); 

    isDarkMode = !isDarkMode;
    
    ripples.push({
        x: bar.x,
        y: H / 2,
        progress: 0,
        targetBg: isDarkMode ? colBgDark : colBgLight,
        targetGridAlpha: isDarkMode ? 15 : 255
    });
}

function drawBars() {
    rectMode(CENTER);
    drawBar(bar1);
    drawBar(bar2);
}

function drawBar(bar) {
    bar.popScale = lerpDT(bar.popScale, 1, 0.2);

    let mainColor = isDarkMode ? colBarDark : colBarLight;
    
    push();
    translate(bar.x, H / 2);
    scale(bar.popScale);
    
    if (bar.isHollow) {
        noFill(); stroke(mainColor); strokeWeight(min(W, H) * 0.009);
    } else {
        fill(mainColor); noStroke();
    }
    rect(0, 0, barWidth, barHeight, barHeight / 2);
    pop();
}

function drawBox() {
    drawSingleBox(boxX, boxY);
    if (state === 'PLAY' || (state === 'TUTORIAL' && tutorialStep === 2)) {
        if (boxX > W - currentBoxSize) drawSingleBox(boxX - W, boxY);
        if (boxX < currentBoxSize) drawSingleBox(boxX + W, boxY);
    }
}

function drawSingleBox(x, y) {
    push();
    translate(x, y);
    rotate(boxAngle);
    
    let alphaFill = map(boxHollowLerp, 0, 1, 255, 0); 
    let alphaStroke = map(boxHollowLerp, 0, 1, 0, 255); 
    
    fill(230, 63, 49, alphaFill); 
    stroke(230, 63, 49, alphaStroke);
    
    strokeWeight(boxSize * 0.15); 
    
    rectMode(CENTER);
    rect(0, 0, currentBoxSize, currentBoxSize, currentBoxSize * 0.15);
    pop();
}

function onTap(clientX, clientY) {
    if (!isSupported) return;

    if (state === 'TITLE') {
        if (isInsideHowToPlayButton(clientX, clientY)) {
            startTutorial(); 
            return;
        }
        state = 'PLAY';
    } else if (state === 'PLAY') {
        let hitBar = null;
        let offset = 0;

        if (abs(boxX - bar1.x) <= barWidth / 2) { hitBar = bar1; offset = boxX - bar1.x; }
        else if (abs(boxX - bar2.x) <= barWidth / 2) { hitBar = bar2; offset = boxX - bar2.x; }

        if (hitBar) {
            if (hitBar.isHollow && !hitBar.cleared) {
                if (boxX < hitBar.x) hitBar.pendingTrigger = true;
                else executeSuccess(hitBar);
            } else {
                triggerGameOver(); 
            }
        } else {
            triggerGameOver(); 
        }
    } else if (state === 'TUTORIAL') {
        handleTutorialTap(); 
    }
}

// ===================== HOW TO PLAY 버튼 + 튜토리얼 =====================

function getHowToPlayButtonRect() {
    let btnW = W * 0.32;
    let btnH = H * 0.042;
    return {
        x: W / 2 - btnW / 2,
        y: H * 0.86 + howToPlayYOffset, // [수정] 애니메이션 오프셋 적용
        w: btnW,
        h: btnH
    };
}

function isInsideHowToPlayButton(px, py) {
    let r = getHowToPlayButtonRect();
    return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function drawHowToPlayButton(alpha) {
    if (alpha <= 1) return;
    let r = getHowToPlayButtonRect();
    push();
    rectMode(CORNER);
    fill(color('#f5f5f5'), alpha);
    strokeWeight(1.5);
    stroke(color('#767676'), alpha);
    rect(r.x, r.y, r.w, r.h, r.h / 1);
    noStroke();
    fill(color('#767676'), alpha);
    textAlign(CENTER, CENTER);
    textSize(r.h * 0.32);
    text("HOW 2 PLAY", r.x + r.w / 2, r.y + r.h / 2 + 1);
    pop();
}

function startTutorial() {
    state = 'TUTORIAL';
    tutorialStep = 0;
    tutorialPracticeHits = 0;
    tutorialFeedbackText = '';
    tutorialFeedbackAlpha = 0;

    bar1.isHollow = false; 
    bar2.isHollow = true;  
    clearBarStates(bar1);
    clearBarStates(bar2);
    bar1.cleared = true;
    bar1.popScale = 1;
    bar2.popScale = 1;

    waveDirection = -1;
    yOffset = 0;
    boxAngle = 0;
    currentSpeed = 0;
    boxX = bar1.x;
    updateBoxY();
}

function handleTutorialTap() {
    if (tutorialStep === 0) {
        tutorialStep = 1;
    } else if (tutorialStep === 1) {
        tutorialStep = 2;
        currentSpeed = baseSpeedX * 0.6; 
    } else if (tutorialStep === 2) {
        let hitBar = null;
        let offset = 0;
        if (abs(boxX - bar1.x) <= barWidth / 2) { hitBar = bar1; offset = boxX - bar1.x; }
        else if (abs(boxX - bar2.x) <= barWidth / 2) { hitBar = bar2; offset = boxX - bar2.x; }

        if (hitBar && hitBar.isHollow && !hitBar.cleared) {
            if (boxX < hitBar.x) hitBar.pendingTrigger = true;
            else executeTutorialSuccess(hitBar);
        } else {
            tutorialFailPractice();
        }
    } else if (tutorialStep === 3) {
        resetGame(); 
    }
}

function checkTutorialBufferedTrigger(bar, pX, cX) {
    if (bar.pendingTrigger && pX <= bar.x && cX >= bar.x) {
        executeTutorialSuccess(bar);
        bar.pendingTrigger = false;
    }
}

function checkTutorialMiss(bar, pX, cX) {
    let rightEdge = bar.x + barWidth / 2;
    if (pX <= rightEdge && cX > rightEdge) {
        if (bar.isHollow && !bar.cleared) {
            tutorialFailPractice();
        }
    }
}

function executeTutorialSuccess(bar) {
    executeSuccess(bar); 
    tutorialPracticeHits++;
    if (tutorialPracticeHits >= TUTORIAL_PRACTICE_TARGET) {
        tutorialStep = 3;
        currentSpeed = 0;
    }
}

function tutorialFailPractice() {
    failFx();
    tutorialFeedbackText = 'TRY AGAIN!';
    tutorialFeedbackAlpha = 255;

    clearBarStates(bar1);
    clearBarStates(bar2);
    bar1.isHollow = false;
    bar2.isHollow = true;
    bar1.cleared = true;
    boxX = bar1.x;
    updateBoxY();
    currentSpeed = baseSpeedX * 0.6;
}

function drawTutorialOverlay() {
    tutorialFeedbackAlpha = lerpDT(tutorialFeedbackAlpha, 0, 0.04);

    push();
    textAlign(CENTER, CENTER);
    noStroke();
    let mainTextColor = isDarkMode ? color(255) : color(30);

    if (tutorialStep === 0) {
        fill(mainTextColor);
        textSize(W * 0.05);
        text("You can still pass the filled bar as is", W / 2, H * 0.32);
        textSize(W * 0.038);
        fill(230, 63, 49);
        text("Tap and it's game over! Don't touch it", W / 2, H * 0.32 + W * 0.08);
        fill(mainTextColor);
        textSize(W * 0.033);
        text("TAP 2 PRACTICE →", W / 2, H * 0.882);
    } else if (tutorialStep === 1) {
        fill(mainTextColor);
        textSize(W * 0.05);
        text("Tap the moment \n the box touches the empty bar", W / 2, H * 0.32);
        textSize(W * 0.038);
        fill(60, 160, 110);
        text("exactly when the box touches the empty bar!", W / 2, H * 0.33 + W * 0.08);
        fill(mainTextColor);
        textSize(W * 0.033);
        text("TAP 2 PRACTICE →", W / 2, H * 0.882);
    } else if (tutorialStep === 2) {
        fill(mainTextColor);
        textSize(W * 0.038);
        text("Practice on your own (" + tutorialPracticeHits + " / " + TUTORIAL_PRACTICE_TARGET + ")", W / 2, H * 0.16);

        if (tutorialFeedbackAlpha > 1) {
            fill(230, 63, 49, tutorialFeedbackAlpha);
            textSize(W * 0.042);
            text(tutorialFeedbackText, W / 2, H * 0.32);
        }
    } else if (tutorialStep === 3) {
        fill(mainTextColor);
        textSize(W * 0.058);
        text("Tutorial Complete!", W / 2, H * 0.32);
        textSize(W * 0.035);
        text("Tap 2 start →", W / 2, H * 0.92);
    }
    pop();
}
